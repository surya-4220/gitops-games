apiVersion: apps/v1
kind: Deployment
metadata:
  name: snake-game
  namespace: games
  labels:
    app: snake-game
spec:
  replicas: 2
  selector:
    matchLabels:
      app: snake-game
  template:
    metadata:
      labels:
        app: snake-game
    spec:
      containers:
      - name: snake-game
        image: miplit/dinogame:latest
        ports:
        - containerPort: 80
