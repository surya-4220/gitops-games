apiVersion: apps/v1
kind: Deployment
metadata:
  name: game-2048-deployment    # ← starts with letter
  namespace: game-2048          # ← matches service namespace
  labels:
    app: 2048-game
spec:
  replicas: 2
  selector:
    matchLabels:
      app: 2048-game
  template:
    metadata:
      labels:
        app: 2048-game
    spec:
      containers:
      - name: game-2048
        image: thipparthiavinash/2048-game
        ports:
        - containerPort: 80