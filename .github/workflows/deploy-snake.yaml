name: Deploy Snake Game

on:
  push:
    branches:
      - main
    paths:
      - 'Snakegame/**'
      - 'apps/argocd-snake.yaml'
      - 'ingress/**'

jobs:
  deploy-snake-game:
    name: Deploy Snake Game
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ap-south-1 \
          --name agrocd

    - name: Apply ArgoCD Applications
      run: |
        kubectl apply -f apps/argocd-snake.yaml
        kubectl apply -f apps/argocd-2048.yaml

    - name: Wait for sync
      run: |
        echo "Waiting for ArgoCD to sync..."
        timeout 120 bash -c '
          until kubectl get application snake-game -n argocd \
            -o jsonpath="{.status.sync.status}" 2>/dev/null | grep -q "Synced"; do
            echo "Still syncing..."
            sleep 10
          done
        '
        echo "✅ Synced!"

    - name: Wait for pods
      run: |
        echo "Waiting for pods in games namespace..."
        kubectl wait --for=condition=Ready pods \
          --all -n games \
          --timeout=120s

    - name: Print ALB URL
      run: |
        echo "Waiting for ALB..."
        sleep 30
        echo "🎮 Games ALB URL:"
        kubectl get ingress games-ingress -n games \
          -o jsonpath="{.status.loadBalancer.ingress[0].hostname}" && echo
        echo ""
        echo "Access games at:"
        ALB=$(kubectl get ingress games-ingress -n games \
          -o jsonpath="{.status.loadBalancer.ingress[0].hostname}")
        echo "🦕 Dino Game : http://$ALB/snakegame"
