name: Deploy Ingress

on:
  push:
    branches:
      - main
    paths:
      - 'ingress/**'
      - 'apps/argocd-ingress.yaml'

jobs:
  deploy-ingress:
    name: Deploy Games Ingress
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-south-1

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig \
          --region ap-south-1 \
          --name agrocd

    - name: Apply Ingress ArgoCD App
      run: |
        kubectl apply -f apps/argocd-ingress.yaml

    - name: Wait for sync
      run: |
        timeout 120 bash -c '
          until kubectl get application games-ingress -n argocd \
            -o jsonpath="{.status.sync.status}" 2>/dev/null | grep -q "Synced"; do
            echo "Still syncing..."
            sleep 10
          done
        '
        echo "✅ Ingress synced!"

    - name: Print ALB URL
      run: |
        sleep 30
        ALB=$(kubectl get ingress games-ingress -n games \
          -o jsonpath="{.status.loadBalancer.ingress[0].hostname}")
        echo "ALB URL: http://$ALB"
        echo "🦕 Dino : http://$ALB/snakegame"
        echo "🎮 2048  : http://$ALB/2048"
