apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: games-ingress
  namespace: games
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /snakegame(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: snake-game-svc
            port:
              number: 80
      - path: /2048(/|$)(.*)
        pathType: ImplementationSpecific
        backend:
          service:
            name: game-2048-svc
            port:
              number: 80
