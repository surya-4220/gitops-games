apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: game-2048
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/surya-4220/gitops-games.git
    targetRevision: main
    path: 2048
  destination:
    server: https://kubernetes.default.svc
    namespace: games
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
