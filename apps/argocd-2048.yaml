apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snake-game
spec:
  project: default
#__________GitHub Details_________#
  source:
    repoURL: https://github.com/surya-4220/gitops-games.git
    targetRevision: main
    path: 2048    #path of my code
 # ── Destination — your EKS cluster ────────────────────────
  destination:
    server: https://kubernetes.default.svc # In-cluster (ArgoCD is on same cluster)
    namespace: 2048-game # Where my pods are running#
  syncPolicy:
    automated:
      prune: true        # delete resources removed from Git
      selfHeal: true     # revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true      # Auto create snake-game namespace if not exists