apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snake-game
  namespace: argocd
spec:
  project: default
#__________GitHub Details_________#
  source:
    repoURL: https://github.com/surya-4220/Agro-CD
    targetRevision: main
    path: Snakegame/    #path of my code
 # ── Destination — your EKS cluster ────────────────────────
  destination:
    server: https://kubernetes.default.svc # In-cluster (ArgoCD is on same cluster)
    namespace: snake-game. # Where my pods are running#
  syncPolicy:
    automated:
      prune: true        # delete resources removed from Git
      selfHeal: true     # revert manual kubectl changes
    syncOptions:
      - CreateNamespace=true